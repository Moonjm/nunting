# 이미지는 compose 밖에서 따로 빌드한다(이 파일엔 build: 스탠자 없음 — `--build` 무효).
# 코드가 바뀔 때마다:
#   docker build -t nunting-server:latest .
#   docker compose up -d
#
# 첫 부팅 전 `cp .env.example .env` — env_file 미존재 시 `up` 가 에러로 멈춤.
#
# DB 는 같은 compose 의 `nnt-postgres` 컨테이너. 서버는 compose 네트워크에서
# 서비스명 `nnt-postgres:5432` 로 붙고(아래 environment 의 NUNTING_DB_HOST),
# depends_on(service_healthy) 으로 Postgres 가 먼저 떠서 ready 된 뒤 서버가 기동한다.

services:
  nnt-postgres:
    image: postgres:17
    container_name: nnt-postgres
    restart: unless-stopped
    environment:
      TZ: "Asia/Seoul"
      POSTGRES_USER: "nnt"
      POSTGRES_DB: "nnt"
      # password 는 단일 출처(.env 의 DB_PASSWORD) — 서버 접속과 동일 값.
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    ports:
      # 호스트(Pi)에서 DBeaver/psql 로 직접 접근할 외부 포트. 컨테이너 내부는 항상 5432.
      # 서버↔DB 통신은 이 매핑과 무관(compose 네트워크 내부 5432 사용).
      - "${DB_PORT:-5432}:5432"
    volumes:
      - nunting_data:/var/lib/postgresql/data
    healthcheck:
      # 서버가 depends_on(service_healthy) 로 이 통과를 기다린다.
      test: ["CMD-SHELL", "pg_isready -U nnt -d nnt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nunting-server:
    image: nunting-server:latest
    container_name: nunting-server
    restart: unless-stopped
    env_file: .env
    depends_on:
      nnt-postgres:
        condition: service_healthy
    ports:
      # 호스트 포트만 .env 로 가변. 컨테이너 내부 포트는 Dockerfile EXPOSE 와 동일.
      - "${NUNTING_HOST_PORT:-8080}:8080"
    volumes:
      # APNs .p8 read-only mount. .env 의 APNS_KEY_PATH 는 컨테이너 내부 경로
      # (/run/secrets/AuthKey_XXX.p8) 를 가리켜야 한다.
      - ./secrets:/run/secrets:ro
      # 로그 파일 영속 — .env 의 NUNTING_LOG_DIR 가 /var/log/nunting/ 안 경로 가리키면 호스트 ./logs/ 에 append.
      - ./logs:/var/log/nunting
    environment:
      TZ: "Asia/Seoul"
      # 컨테이너 안에서는 항상 0.0.0.0 으로 bind — 호스트 포트 매핑 동작 보장.
      NUNTING_BIND_HOST: "0.0.0.0"
      NUNTING_BIND_PORT: "8080"
      # DB 접속 — host 는 compose 서비스명(고정), port 는 컨테이너 내부 5432(고정,
      # 외부 노출 DB_PORT 와 무관). password 만 .env 의 DB_PASSWORD 를 매핑.
      NUNTING_DB_HOST: "nnt-postgres"
      NUNTING_DB_PORT: "5432"
      NUNTING_DB_NAME: "nnt"
      NUNTING_DB_USER: "nnt"
      NUNTING_DB_PASSWORD: "${DB_PASSWORD}"
      NUNTING_DB_SSLMODE: "disable"

volumes:
  nunting_data:
